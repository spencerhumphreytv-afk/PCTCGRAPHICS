<script>
const CATS  = ["BENEFIT\nRECIPIENTS", "FAMILIES\nUNDER $75K", "FAMILIES\n$75K\u2013$150K", "FAMILIES\n$150K\u2013$225K", "FAMILIES\n$225K\u2013$250K", "FAMILIES\nOVER $250K"];
const VALS  = [-237, -630, 1, 168, 98, 995];
const N     = 6;
const W=1920, H=964;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const PAD_L=80, PAD_R=80, PAD_T=80, PAD_B=140;
const CHART_H=744, CHART_W=1760;
const Y_MAX=995, Y_MIN=-630, Y_SPAN=1625;
const AXIS_Y=536;
const BAR_W=246, BAR_GAP=40;

const GREEN='#39D98A', RED='#FF3B4E';

function barX(i){ return PAD_L + BAR_GAP + i*(BAR_W+BAR_GAP); }
function barPx(v){ return Math.abs(v)/Y_SPAN*CHART_H; }
function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

function drawAxes(){
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.strokeStyle='rgba(255,255,255,0.9)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(PAD_L, AXIS_Y);
  ctx.lineTo(W-PAD_R, AXIS_Y);
  ctx.stroke();
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#fff';
  ctx.font="800 26px 'Breakers',sans-serif";
  ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText('0', PAD_L-14, AXIS_Y);
  ctx.restore();
}

function drawBar(i, progress){
  const val   = VALS[i];
  const color = val < 0 ? RED : GREEN;
  const fullH = barPx(val);
  const h     = fullH * progress;
  const x     = barX(i);
  const y     = val >= 0 ? AXIS_Y - h : AXIS_Y;

  ctx.save();
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';

  // Rounded cap on the growing end
  const r = Math.min(10, BAR_W/4, Math.max(0, h/2-1));
  ctx.beginPath();
  if(val >= 0){
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+BAR_W-r, y);
    ctx.quadraticCurveTo(x+BAR_W, y, x+BAR_W, y+r);
    ctx.lineTo(x+BAR_W, y+h);
    ctx.lineTo(x, y+h);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
  } else {
    ctx.moveTo(x, y);
    ctx.lineTo(x+BAR_W, y);
    ctx.lineTo(x+BAR_W, y+h-r);
    ctx.quadraticCurveTo(x+BAR_W, y+h, x+BAR_W-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();

  // Value label — fades in after bar is 55% grown
  if(progress > 0.55){
    const a = Math.min(1,(progress-0.55)/0.35);
    const sign = val > 0 ? '+' : '−';
    const text = sign + Math.abs(val).toLocaleString();
    ctx.globalAlpha = a;
    ctx.fillStyle = color;
    ctx.font = "900 60px 'Breakers',sans-serif";
    ctx.textAlign = 'center';
    // Positive: label above bar. Negative: label below bar.
    if(val >= 0){
      ctx.textBaseline = 'bottom';
      ctx.fillText(text, x+BAR_W/2, AXIS_Y - h - 14);
    } else {
      ctx.textBaseline = 'top';
      ctx.fillText(text, x+BAR_W/2, AXIS_Y + h + 14);
    }
  }
  ctx.restore();
}

function drawCatLabel(i, alpha){
  const x     = barX(i) + BAR_W/2;
  const lines = CATS[i].split('\n');
  // Labels sit just below the axis line
  const labelY = AXIS_Y + 18;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = "700 27px 'Breakers',sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  lines.forEach((line, li) => { ctx.fillText(line, x, labelY + li*34); });
  ctx.restore();
}

const GROW_T=0.65, HOLD_T=0.2, PER=GROW_T+HOLD_T;
const FINAL=3.5;
const TOTAL=PER*N+FINAL;

let t0=null;
function frame(ts){
  if(!t0) t0=ts;
  const el=((ts-t0)/1000)%TOTAL;
  ctx.clearRect(0,0,W,H);
  drawAxes();

  const done   = Math.min(N, Math.floor(el/PER));
  const within = el - done*PER;

  for(let i=0;i<done;i++){
    drawBar(i,1);
    drawCatLabel(i,1);
  }

  if(done < N){
    const p = Math.min(1, ease(within/GROW_T));
    drawBar(done, p);
    drawCatLabel(done, Math.min(1, within/(GROW_T*0.6)));
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
  <script>
(function () {
  function fitGraphic() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return;

    var originalWidth = 1920;
    var originalHeight = 1080;
    var scale = window.innerWidth / originalWidth;

    document.documentElement.style.margin = "0";
    document.documentElement.style.padding = "0";
    document.documentElement.style.overflow = "hidden";

    document.body.style.margin = "0";
    document.body.style.padding = "0";
    document.body.style.overflow = "hidden";
    document.body.style.width = "100%";
    document.body.style.height = Math.ceil(originalHeight * scale) + "px";

    canvas.style.width = originalWidth + "px";
    canvas.style.height = originalHeight + "px";
    canvas.style.transformOrigin = "top left";
    canvas.style.transform = "scale(" + scale + ")";
    canvas.style.display = "block";
  }

  window.addEventListener("load", fitGraphic);
  window.addEventListener("resize", fitGraphic);
  setTimeout(fitGraphic, 500);
  setTimeout(fitGraphic, 1500);
})();
</script>
</body></html>
